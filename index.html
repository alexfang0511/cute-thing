<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Story ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="quiz-container" class="container">
        <h2 id="question-text">Question 1: Where was our first date?</h2>
        <div id="options-container">
            </div>
        <p id="feedback" class="hidden">Oops! Try again... ❤️</p>
    </div>

    <div id="game-container" class="container hidden">
        <h1>You got them all right!</h1>
        <p>Now, catch your final prize...</p>
        <div id="boxWrapper">
            <div id="giftBox">🎁</div>
        </div>
    </div>

    <div id="reveal-container" class="container hidden">
        <h1 class="proposal-text">Will you marry me?</h1>
        <img src="ring.png" alt="Engagement Ring" class="ring-image">
        <button id="finalYes">YES!</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
