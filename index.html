<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Surprise ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="gameScene">
        <h1 id="instruction">There's something waiting for you... catch it!</h1>
        <div id="boxWrapper">
            <div id="giftBox">🎁</div>
        </div>
    </div>

    <div id="revealScene" class="hidden">
        <div class="ring-container">
            <h1 class="proposal-text">Will you marry me?</h1>
            <img src="https://i.ibb.co/v3s8f8x/engagement-ring.png" alt="Engagement Ring" class="ring-image">
            <div class="final-buttons">
                <button id="finalYes">YES!</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
